<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>DCF Admin Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0b0b0b;
            color: white;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 1100px;
            margin: auto;
            padding: 30px 20px;
        }

        .card {
            background: #111;
            border: 1px solid rgba(47, 158, 111, .35);
            border-radius: 18px;
            box-shadow: 0 0 25px rgba(47, 158, 111, .12);
            padding: 28px;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #2f9e6f;
            font-size: 34px;
        }

        #loginPage {
            margin-top: 90px;
            max-width: 520px;
        }

        .input,
        select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #2f9e6f;
            background: #0d0d0d;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2f9e6f;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: .2s;
        }

        .btn:hover {
            background: #37b77f;
        }

        .logout {
            width: auto;
            padding: 10px 18px;
            border-radius: 10px;
            background: #1d1d1d;
            border: 1px solid #2f9e6f;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #welcome {
            color: #9ad9b8;
            font-size: 14px;
            margin-top: 6px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr auto;
            gap: 12px;
            margin-bottom: 22px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 22px;
        }

        .stat {
            background: #151515;
            border: 1px solid rgba(47, 158, 111, .22);
            border-radius: 16px;
            padding: 22px;
            text-align: center;
        }

        .stat h3 {
            color: #9ad9b8;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat p {
            color: #2f9e6f;
            font-size: 30px;
            font-weight: bold;
        }

        .student {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            margin-bottom: 10px;
            border-radius: 14px;
            background: #151515;
            border: 1px solid rgba(47, 158, 111, .18);
        }

        .badge {
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .present {
            background: rgba(47, 158, 111, .15);
            color: #57d696;
            border: 1px solid rgba(47, 158, 111, .4);
        }

        .absent {
            background: rgba(220, 53, 69, .14);
            color: #ff7d88;
            border: 1px solid rgba(220, 53, 69, .35);
        }

        .hidden {
            display: none !important;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-box {
            width: 420px;
            max-width: 90%;
            background: #111;
            border: 1px solid #2f9e6f;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 0 30px rgba(47, 158, 111, .18);
        }

        .modal-box h3 {
            color: #2f9e6f;
            margin-bottom: 12px;
            text-align: center;
            font-size: 24px;
        }

        .modal-box p {
            color: #eee;
            line-height: 1.6;
            margin-bottom: 25px;
            text-align: center;
        }

        @media(max-width:900px) {

            .controls,
            .summary {
                grid-template-columns: 1fr;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .flatpickr-calendar {
            background: #111 !important;
            border: 1px solid #2f9e6f !important;
            border-radius: 16px !important;
        }

        .flatpickr-day.prevMonthDay,
        .flatpickr-day.nextMonthDay {
            visibility: hidden !important;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="loginPage" class="wrapper">
        <div class="card">
            <h1>DCF Admin</h1>
            <input id="username" class="input" placeholder="Username">
            <input id="password" class="input" type="password" placeholder="Password">
            <button id="loginBtn" class="btn" onclick="login()">Login</button>
        </div>
    </div>

    <div id="dashboard" class="wrapper hidden">
        <div class="card">

            <div class="topbar">
                <div>
                    <h1 style="margin:0">Admin Dashboard</h1>
                    <div id="welcome"></div>
                </div>
                <button class="btn logout" onclick="logout()">Logout</button>
            </div>

            <div class="controls">
                <select id="sheetName"></select>
                <input type="text" id="date" placeholder="Select Date" readonly>
                <select id="hour">
                    <option value="9-10">9-10</option>
                    <option value="10-11">10-11</option>
                    <option value="11-12">11-12</option>
                    <option value="12-1">12-1</option>
                    <option value="2-3">2-3</option>
                    <option value="3-4">3-4</option>
                </select>
                <button id="loadBtn" class="btn" onclick="loadReport()">Load</button>
            </div>

            <div class="summary">
                <div class="stat">
                    <h3>Total Students</h3>
                    <p id="total">0</p>
                </div>
                <div class="stat">
                    <h3>Present</h3>
                    <p id="present">0</p>
                </div>
                <div class="stat">
                    <h3>Absent</h3>
                    <p id="absent">0</p>
                </div>
                <div class="stat">
                    <h3>Attendance %</h3>
                    <p id="percent">0%</p>
                </div>
            </div>

            <div id="studentList"></div>

        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modalTitle">Message</h3>
            <p id="modalText"></p>
            <button class="btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        const webAppURL = "https://script.google.com/macros/s/AKfycbxoWU-3BYK7rlQYpfMuyHcokxXqQ0P7SPuBLG6CaO1dNke1qGPCS8cu3aUe2_1w5oj5Aw/exec";

        const SUBJECT_NAMES = {
            BSC_CPP: "BSc - C++",
            BSC_CPP_PRACT: "BSc - C++ (Practical)",
            BSC_PYTHON: "BSc - Python",
            BSC_PYTHON_PRACT: "BSc - Python (Practical)",
            MSC_SCRIPT: "MSc - Scripting",
            MSC_SCRIPT_PRACT: "MSc - Scripting (Practical)"
        };

        let admin = null;

        document.addEventListener("DOMContentLoaded", () => {
            flatpickr("#date", {
                dateFormat: "Y-m-d",
                defaultDate: "today",
                disableMobile: true,
                showMonths: 1
            });

            const saved = localStorage.getItem("adminData");
            if (saved) {
                admin = JSON.parse(saved);
                openDashboard();
            }
        });

        function showAlert(title, message) {
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalText").innerText = message;
            document.getElementById("modalOverlay").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("modalOverlay").classList.add("hidden");
        }

        async function login() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const btn = document.getElementById("loginBtn");
            const old = btn.innerHTML;

            if (!username || !password) {
                showAlert("Missing Details", "Enter username and password");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Logging in...';

            try {
                const response = await fetch(webAppURL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "login",
                        username,
                        password
                    })
                });

                const res = await response.json();

                if (!res.success) {
                    showAlert("Login Failed", res.message);
                } else if (res.role !== "ADMIN") {
                    showAlert("Access Denied", "Admin access only");
                } else {
                    admin = res;
                    localStorage.setItem("adminData", JSON.stringify(admin));
                    openDashboard();
                }

            } catch {
                showAlert("Error", "Unable to login");
            } finally {
                btn.disabled = false;
                btn.innerHTML = old;
            }
        }

        function openDashboard() {
            document.getElementById("loginPage").classList.add("hidden");
            document.getElementById("dashboard").classList.remove("hidden");
            document.getElementById("welcome").innerText = "Welcome, " + admin.name;

            const dropdown = document.getElementById("sheetName");
            dropdown.innerHTML = "";

            Object.keys(SUBJECT_NAMES).forEach(key => {
                const option = document.createElement("option");
                option.value = key;
                option.textContent = SUBJECT_NAMES[key];
                dropdown.appendChild(option);
            });
        }

        function logout() {
            localStorage.removeItem("adminData");
            location.reload();
        }

        async function loadReport() {
            const btn = document.getElementById("loadBtn");
            const old = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Loading...';

            try {
                const response = await fetch(webAppURL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "report",
                        username: admin.username,
                        sheetName: document.getElementById("sheetName").value,
                        date: document.getElementById("date").value,
                        hour: document.getElementById("hour").value
                    })
                });

                const res = await response.json();

                if (!res.success) {
                    showAlert("Message", res.message);
                    return;
                }

                document.getElementById("total").innerText = res.total;
                document.getElementById("present").innerText = res.present;
                document.getElementById("absent").innerText = res.absent;
                document.getElementById("percent").innerText = res.percentage + "%";

                const list = document.getElementById("studentList");
                list.innerHTML = "";

                res.students.forEach(student => {
                    const div = document.createElement("div");
                    div.className = "student";
                    div.innerHTML = `
                        <span>${student.RegNo} - ${student.Name}</span>
                        <span class="badge ${student.Status === "Present" ? "present" : "absent"}">
                            ${student.Status || "N/A"}
                        </span>
                    `;
                    list.appendChild(div);
                });

            } catch {
                showAlert("Error", "Failed to load report");
            } finally {
                btn.disabled = false;
                btn.innerHTML = old;
            }
        }
    </script>

</body>

</html>
