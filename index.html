<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <title>DCF Attendance</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0b0b0b;
            color: white;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 850px;
            margin: auto;
            padding: 30px 20px;
        }

        /* card */
        .card {
            background: #111;
            border: 1px solid rgba(47, 158, 111, .35);
            border-radius: 18px;
            box-shadow: 0 0 25px rgba(47, 158, 111, .12);
            padding: 28px;
        }

        /* heading */
        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #2f9e6f;
            font-size: 34px;
        }

        /* login */
        #loginPage {
            margin-top: 90px;
        }

        .input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #2f9e6f;
            background: #0d0d0d;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .input:focus {
            box-shadow: 0 0 10px rgba(47, 158, 111, .2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2f9e6f;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: .2s;
        }

        .btn:hover {
            background: #37b77f;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logout {
            width: auto;
            padding: 10px 18px;
            border-radius: 10px;
            background: #1d1d1d;
            border: 1px solid #2f9e6f;
        }

        /* controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1.3fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        select,
        #date {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #2f9e6f;
            background: #0d0d0d;
            color: white;
            font-size: 15px;
            outline: none;
        }

        /* student */
        .student {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            margin-bottom: 10px;
            border-radius: 14px;
            background: #151515;
            border: 1px solid rgba(47, 158, 111, .18);
            transition: .2s;
        }

        .student:hover {
            background: #1b1b1b;
            transform: translateY(-1px);
        }

        .student span {
            font-size: 15px;
        }

        .student input {
            width: 22px;
            height: 22px;
            accent-color: #2f9e6f;
        }

        .hidden {
            display: none;
        }

        #welcome {
            color: #9ad9b8;
            font-size: 14px;
        }

        @media(max-width:700px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* flatpickr custom theme */
        .flatpickr-calendar {
            background: #111 !important;
            border: 1px solid #2f9e6f !important;
            box-shadow: 0 0 25px rgba(47, 158, 111, .18) !important;
            border-radius: 16px !important;
        }

        .flatpickr-months .flatpickr-month {
            color: white !important;
            fill: white !important;
        }

        .flatpickr-weekday {
            color: #2f9e6f !important;
            font-weight: 600;
        }

        .flatpickr-day {
            color: white !important;
            border-radius: 10px !important;
        }

        .flatpickr-day:hover {
            background: #1d1d1d !important;
        }

        .flatpickr-day.selected {
            background: #2f9e6f !important;
            border-color: #2f9e6f !important;
        }

        .flatpickr-day.today {
            border-color: #2f9e6f !important;
        }

        .flatpickr-prev-month svg,
        .flatpickr-next-month svg {
            fill: white !important;
        }

        /* month dropdown */
        .flatpickr-monthDropdown-months {
            background: #111 !important;
            color: white !important;
            border: none !important;
            outline: none !important;
            appearance: none;
        }

        .flatpickr-monthDropdown-month {
            background: #111 !important;
            color: white !important;
        }

        /* year input */
        .numInputWrapper input {
            background: transparent !important;
            color: white !important;
            border: none !important;
            outline: none !important;
            font-weight: 600;
        }

        /* year arrows */
        .numInputWrapper span {
            filter: invert(1);
            opacity: .8;
        }

        .numInputWrapper span:hover {
            opacity: 1;
            background: rgba(47, 158, 111, .2) !important;
        }

        /* hover month */
        .flatpickr-monthDropdown-month:hover {
            background: #1b1b1b !important;
        }

        /* selected month */
        .flatpickr-monthDropdown-months option:checked,
        .flatpickr-monthDropdown-month:selected {
            background: #2f9e6f !important;
            color: white !important;
        }

        /* hide previous / next month days */
        .flatpickr-day.prevMonthDay,
        .flatpickr-day.nextMonthDay {
            visibility: hidden !important;
            pointer-events: none;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-box {
            width: 420px;
            max-width: 90%;
            background: #111;
            border: 1px solid #2f9e6f;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 0 30px rgba(47, 158, 111, .18);
            animation: pop .22s ease;
        }

        .modal-box h3 {
            color: #2f9e6f;
            margin-bottom: 12px;
            text-align: center;
            font-size: 24px;
        }

        .modal-box p {
            color: #eee;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn.secondary {
            background: transparent;
            border: 1px solid #2f9e6f;
        }

        .hidden {
            display: none !important;
        }

        @keyframes pop {
            from {
                transform: scale(.92);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .password-box {
            position: relative;
        }

        .password-box .input {
            margin-bottom: 15px;
            padding-right: 50px;
        }

        .toggle-eye {
            position: absolute;
            right: 18px;
            top: 40%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #9ad9b8;
            user-select: none;
            transition: .2s;
        }

        .toggle-eye:hover {
            color: #2f9e6f;
        }

        .toggle-eye svg {
            display: block;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="loginPage" class="wrapper">
        <div class="card">
            <h1>Department of DCF</h1>
            <input id="username" class="input" placeholder="Username">
            <div class="password-box">
                <input id="password" class="input" type="password" placeholder="Password">

                <span class="toggle-eye" onclick="togglePassword()">
                    <!-- open eye -->
                    <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </span>
            </div>
            <button class="btn" onclick="login()">Login</button>
        </div>
    </div>

    <!-- ATTENDANCE -->
    <div id="attendancePage" class="wrapper hidden">
        <div class="card">

            <div class="topbar">
                <div>
                    <h1 style="margin:0">Mark Attendance</h1>
                    <div id="welcome"></div>
                </div>
                <button class="btn logout" onclick="logout()">Logout</button>
            </div>

            <div class="controls">
                <!-- <input type="date" id="date"> -->
                <input type="text" id="date" placeholder="Select Date" readonly>

                <select id="hour">
                    <option value="9-10">9-10</option>
                    <option value="10-11">10-11</option>
                    <option value="11-12">11-12</option>
                    <option value="12-1">12-1</option>
                    <option value="2-3">2-3</option>
                    <option value="3-4">3-4</option>
                </select>

                <select id="sheetName" onchange="loadStudents()">
                    <option value="">Select Subject</option>
                    <option value="BSC_CPP">BSc - C++</option>
                    <option value="BSC_CPP_PRACT">BSc - C++ - PRACTICAL</option>
                    <option value="BSC_PYTHON">BSc - Python</option>
                    <option value="BSC_PYTHON_PRACT">BSc - Python - PRACTICAL</option>
                    <option value="MSC_SCRIPT">MSc - Scripting</option>
                    <option value="MSC_SCRIPT_PRACT">MSc - Scripting - PRACTICAL</option>
                </select>
            </div>

            <input type="text" id="searchStudent" class="input" placeholder="🔍 Search RegNo / Name" oninput="filterStudents()" style="margin-bottom:18px;">

            <div id="studentList"></div>

            <button id="submitAttendence" class="btn" onclick="submitAttendance()">
                Submit Attendance
            </button>

        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modalTitle">Message</h3>
            <p id="modalText"></p>

            <div class="modal-actions">
                <button id="modalCancel" class="btn secondary hidden">
                    Cancel
                </button>

                <button id="modalOk" class="btn">
                    OK
                </button>
            </div>
        </div>
    </div>

    <script>
        const webAppURL =
            "https://script.google.com/macros/s/AKfycbxoWU-3BYK7rlQYpfMuyHcokxXqQ0P7SPuBLG6CaO1dNke1qGPCS8cu3aUe2_1w5oj5Aw/exec";


        const SUBJECT_NAMES = {
            BSC_CPP: "BSc - C++",
            BSC_CPP_PRACT: "BSc - C++ (Practical)",
            BSC_PYTHON: "BSc - Python",
            BSC_PYTHON_PRACT: "BSc - Python (Practical)",
            MSC_SCRIPT: "MSc - Scripting",
            MSC_SCRIPT_PRACT: "MSc - Scripting (Practical)"
        };

        let teacher = null;
        let allStudents = [];
        let filteredStudents = [];
        let attendanceState = {};
        let currentPage = 1;
        const studentsPerPage = 20;

        document.addEventListener("DOMContentLoaded", () => {
            flatpickr("#date", {
                dateFormat: "Y-m-d",
                defaultDate: "today",
                disableMobile: true,
                showMonths: 1
            });

            const savedTeacher = localStorage.getItem("teacherData");

            if (savedTeacher) {
                teacher = JSON.parse(savedTeacher);
                showAttendance();
            }
        });

        async function login() {

            const username =
                document.getElementById("username").value.trim();

            const password =
                document.getElementById("password").value.trim();

            const loginBtn =
                document.querySelector("#loginPage .btn");

            const originalText =
                loginBtn.innerHTML;

            if (!username || !password) {
                await showAlert(
                    "Missing Details",
                    "Enter username and password"
                );
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML =
                '<span class="spinner"></span>Logging in...';

            try {

                const response = await fetch(webAppURL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "login",
                        username,
                        password
                    })
                });

                const res = await response.json();

                if (res.success) {

                    teacher = {
                        username: res.username,
                        name: res.name,
                        subjects: res.subjects
                    };

                    localStorage.setItem(
                        "teacherData",
                        JSON.stringify(teacher)
                    );

                    document
                        .getElementById("loginPage")
                        .classList.add("hidden");

                    document
                        .getElementById("attendancePage")
                        .classList.remove("hidden");

                    document.getElementById("welcome").innerText =
                        "Welcome, " + teacher.name;

                    setTimeout(buildSubjectDropdown, 50);

                } else {

                    await showAlert(
                        "Login Failed",
                        res.message
                    );

                }

            } catch (err) {

                console.error(err);

                await showAlert(
                    "Error",
                    "Unable to login. Please try again."
                );

            } finally {

                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;

            }
        }

        // SHOW PAGE
        function showAttendance() {
            document.getElementById("loginPage").classList.add("hidden");
            document.getElementById("attendancePage").classList.remove("hidden");
            document.getElementById("welcome").innerText =
                "Welcome, " + teacher.name;

            if (!teacher || !teacher.username) {
                logout();
                return;
            }
            buildSubjectDropdown();
        }

        // BUILD SUBJECT DROPDOWN
        function buildSubjectDropdown() {
            const dropdown =
                document.getElementById("sheetName");

            dropdown.innerHTML = "";

            let subjects = teacher.subjects.includes("ALL") ?
                Object.keys(SUBJECT_NAMES) :
                teacher.subjects;

            subjects.forEach(subject => {
                const option =
                    document.createElement("option");

                option.value = subject;
                option.textContent =
                    SUBJECT_NAMES[subject] || subject;

                dropdown.appendChild(option);
            });

            loadStudents();
        }

        // LOGOUT
        function logout() {
            localStorage.removeItem("teacherData");
            location.reload();
        }

        function loadStudents() {
            const sheet =
                document.getElementById("sheetName").value;

            const list =
                document.getElementById("studentList");

            list.innerHTML = "Loading...";

            currentPage = 1;
            allStudents = [];
            filteredStudents = [];
            attendanceState = {};

            document.getElementById("searchStudent").value = "";

            fetch(webAppURL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "students",
                        username: teacher.username,
                        sheetName: sheet
                    })
                })
                .then(r => r.json())
                .then(res => {


                    if (!res.success || !res.students) {
                        list.innerHTML =
                            "<p>" + (res.message || "Failed to load students") + "</p>";
                        return;
                    }

                    const data = res.students;

                    if (data.length === 0) {
                        list.innerHTML = "<p>No students found</p>";
                        return;
                    }

                    allStudents = data.map(row => ({
                        regno: row.RegNo,
                        name: row.Name
                    }));

                    filteredStudents = [...allStudents];

                    allStudents.forEach(student => {
                        attendanceState[student.regno] = true;
                    });

                    renderStudents();
                })
                .catch(err => {
                    list.innerHTML = "<p>Failed to load students</p>";
                });
        }

        // SEARCH
        function filterStudents() {
            const q =
                document.getElementById("searchStudent")
                .value
                .toLowerCase()
                .trim();

            if (!q) {
                filteredStudents = [...allStudents];
            } else {
                filteredStudents =
                    allStudents.filter(student =>
                        student.regno.toLowerCase().includes(q) ||
                        student.name.toLowerCase().includes(q)
                    );
            }

            currentPage = 1;
            renderStudents();
        }

        // RENDER
        function renderStudents() {
            const list =
                document.getElementById("studentList");

            list.innerHTML = "";

            const start =
                (currentPage - 1) * studentsPerPage;

            const end =
                start + studentsPerPage;

            const pageStudents =
                filteredStudents.slice(start, end);

            pageStudents.forEach(student => {
                const div =
                    document.createElement("div");

                div.className = "student";

                div.innerHTML = `
            <span>${student.regno} - ${student.name}</span>
            <input type="checkbox"
                ${attendanceState[student.regno] ? "checked" : ""}
                onchange="toggleAttendance('${student.regno}', this.checked)">
        `;

                list.appendChild(div);
            });

            renderPagination();
        }

        // TOGGLE
        function toggleAttendance(regno, checked) {
            attendanceState[regno] = checked;
        }

        // PAGINATION
        function renderPagination() {
            const old =
                document.getElementById("pagination");

            if (old) old.remove();

            if (filteredStudents.length <= studentsPerPage) {
                return;
            }

            const totalPages =
                Math.ceil(filteredStudents.length / studentsPerPage);

            const div =
                document.createElement("div");

            div.id = "pagination";
            div.style.textAlign = "center";
            div.style.marginTop = "20px";
            div.style.marginBottom = "45px";

            div.innerHTML = `
        <button class="btn logout"
            onclick="prevPage()"
            ${currentPage === 1 ? "disabled" : ""}>
            Previous
        </button>

        <span style="margin:0 15px;">
            Page ${currentPage} / ${totalPages}
        </span>

        <button class="btn logout"
            onclick="nextPage()"
            ${currentPage === totalPages ? "disabled" : ""}>
            Next
        </button>

        <br><br>

        <button class="btn logout"
            onclick="selectAllPage(true)">
            Select All
        </button>

        <button class="btn logout"
            onclick="selectAllPage(false)">
            Unselect All
        </button>
    `;

            document.getElementById("studentList").after(div);
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderStudents();
            }
        }

        function nextPage() {
            const totalPages =
                Math.ceil(filteredStudents.length / studentsPerPage);

            if (currentPage < totalPages) {
                currentPage++;
                renderStudents();
            }
        }

        // SELECT PAGE
        function selectAllPage(status) {
            const start =
                (currentPage - 1) * studentsPerPage;

            const end =
                start + studentsPerPage;

            const pageStudents =
                filteredStudents.slice(start, end);

            pageStudents.forEach(student => {
                attendanceState[student.regno] = status;
            });

            renderStudents();
        }

        async function submitAttendance() {

            if (!allStudents.length) {
                await showAlert("Warning", "No students loaded");
                return;
            }

            const submitBtn =
                document.getElementById("submitAttendence");

            const originalText =
                submitBtn.innerHTML;

            submitBtn.disabled = true;
            submitBtn.innerHTML =
                '<span class="spinner"></span>Submitting...';

            const data = {
                action: "attendance",
                username: teacher.username,
                sheetName: document.getElementById("sheetName").value,
                date: document.getElementById("date").value,
                hour: document.getElementById("hour").value,
                override: false,
                students: []
            };

            allStudents.forEach(student => {
                data.students.push({
                    regno: student.regno,
                    status: attendanceState[student.regno] ?
                        "Present" : "Absent"
                });
            });

            try {

                let response = await fetch(webAppURL, {
                    method: "POST",
                    body: JSON.stringify(data)
                });

                let res = await response.json();

                if (
                    !res.success &&
                    res.message.includes("already exists")
                ) {

                    const yes = await showConfirm(
                        "Overwrite Attendance",
                        "Attendance already exists.\nDo you want to overwrite it?"
                    );

                    if (yes) {

                        data.override = true;

                        response = await fetch(webAppURL, {
                            method: "POST",
                            body: JSON.stringify(data)
                        });

                        res = await response.json();
                    }
                }

                await showAlert(
                    res.success ? "Success" : "Message",
                    res.message
                );

            } catch (err) {

                await showAlert(
                    "Error",
                    "Submission failed"
                );

                console.error(err);

            } finally {

                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;

            }
        }

        function showAlert(title, message) {
            return new Promise(resolve => {
                const overlay = document.getElementById("modalOverlay");
                document.getElementById("modalTitle").innerText = title;
                document.getElementById("modalText").innerText = message;

                document.getElementById("modalCancel").classList.add("hidden");
                overlay.classList.remove("hidden");

                document.getElementById("modalOk").onclick = () => {
                    overlay.classList.add("hidden");
                    resolve(true);
                };
            });
        }

        function showConfirm(title, message) {
            return new Promise(resolve => {
                const overlay = document.getElementById("modalOverlay");
                document.getElementById("modalTitle").innerText = title;
                document.getElementById("modalText").innerText = message;

                const cancelBtn = document.getElementById("modalCancel");
                cancelBtn.classList.remove("hidden");

                overlay.classList.remove("hidden");

                document.getElementById("modalOk").onclick = () => {
                    overlay.classList.add("hidden");
                    resolve(true);
                };

                cancelBtn.onclick = () => {
                    overlay.classList.add("hidden");
                    resolve(false);
                };
            });
        }

        function togglePassword() {
            const pass =
                document.getElementById("password");

            const eye =
                document.getElementById("eyeIcon");

            if (pass.type === "password") {

                pass.type = "text";

                // closed eye
                eye.innerHTML = `
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.77 21.77 0 0 1 5.06-7.06"/>
            <path d="M9.53 9.53a3 3 0 0 0 4.24 4.24"/>
            <path d="M1 1l22 22"/>
        `;

            } else {

                pass.type = "password";

                // open eye
                eye.innerHTML = `
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
        `;
            }
        }
    </script>



</body>

</html>
